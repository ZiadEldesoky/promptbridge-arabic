<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptBridge Arabic</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        width: 310px;
        margin: 0;
        padding: 14px;
        color: #17202a;
        background: #f8fafc;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
        line-height: 1.25;
      }

      form {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 5px;
        font-size: 12px;
        color: #344054;
      }

      select,
      button {
        width: 100%;
        min-height: 34px;
        border-radius: 7px;
        border: 1px solid #cbd5e1;
        font: inherit;
      }

      select {
        padding: 0 8px;
        background: #ffffff;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .check input {
        margin: 0;
      }

      button {
        border-color: #155eef;
        color: #ffffff;
        background: #155eef;
        cursor: pointer;
      }

      .hint {
        margin: -4px 0 0;
        font-size: 11px;
        line-height: 1.45;
        color: #667085;
      }

      #status {
        min-height: 18px;
        margin: 2px 0 0;
        font-size: 12px;
        color: #475467;
      }

      @media (prefers-color-scheme: dark) {
        body {
          color: #e5e7eb;
          background: #111827;
        }

        label,
        .hint,
        #status {
          color: #cbd5e1;
        }

        select {
          color: #e5e7eb;
          border-color: #334155;
          background: #1f2937;
        }
      }
    </style>
  </head>
  <body>
    <h1>PromptBridge Arabic</h1>
    <form id="promptbridge-form">
      <label>
        Mode
        <select id="mode">
          <option value="">Auto detect</option>
          <option value="general">General</option>
          <option value="fix">Fix</option>
          <option value="refactor">Refactor</option>
          <option value="review">Review</option>
          <option value="tests">Tests</option>
          <option value="explain">Explain</option>
          <option value="security">Security</option>
        </select>
      </label>
      <label class="check">
        <input id="redact" type="checkbox" />
        Redact common secrets
      </label>
      <label class="check">
        <input id="bilingual" type="checkbox" />
        Include Arabic summary
      </label>
      <label class="check">
        <input id="fallback-to-field" type="checkbox" />
        Convert focused prompt box when nothing is selected
      </label>
      <p class="hint">
        Settings are saved locally and used by the popup, context menu, and
        shortcut.
      </p>
      <button type="submit">Convert Selection</button>
      <p id="status">Select Arabic text inside a prompt box first.</p>
    </form>
    <script src="./dist/popup.js"></script>
  </body>
</html>
