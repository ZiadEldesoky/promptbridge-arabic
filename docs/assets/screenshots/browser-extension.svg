  <text x="128" y="188" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">AI coding assistant</text>
  <text x="128" y="220" fill="#98A2B3" font-family="Inter, Arial, sans-serif" font-size="15">Write naturally in Arabic, then convert before sending.</text>

  <rect x="128" y="270" width="632" height="98" rx="14" fill="#1D2939" stroke="#344054"/>
