  <circle cx="82" cy="76" r="8" fill="#EF4444"/>
  <circle cx="108" cy="76" r="8" fill="#F59E0B"/>
  <circle cx="134" cy="76" r="8" fill="#22C55E"/>
  <rect x="178" y="62" width="620" height="30" rx="15" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="202" y="82" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="14">https://chat.example.local</text>
  <rect x="1042" y="60" width="132" height="34" rx="17" fill="#111827"/>
  <text x="1066" y="82" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">PromptBridge</text>

