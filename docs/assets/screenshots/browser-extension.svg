  <text x="908" y="526" fill="#067647" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Local-first conversion</text>
  <text x="908" y="556" fill="#067647" font-family="Inter, Arial, sans-serif" font-size="14">No API key. No external AI call.</text>
