<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PromptBridge Arabic browser extension workflow</title>
  <desc id="desc">A browser screenshot-style mockup showing Arabic prompt text converted into a structured English prompt using the PromptBridge Arabic extension.</desc>
  <rect width="1280" height="760" fill="#F4F6F8"/>
  <rect x="52" y="44" width="1176" height="672" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>
