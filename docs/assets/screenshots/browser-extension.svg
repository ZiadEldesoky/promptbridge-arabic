  <rect x="152" y="324" width="368" height="26" rx="6" fill="#155EEF" opacity="0.32"/>
  <text x="152" y="344" fill="#D1E0FF" font-family="Inter, Arial, sans-serif" font-size="13">Selected Arabic prompt text</text>

  <rect x="128" y="404" width="632" height="178" rx="14" fill="#FFFFFF"/>
  <text x="152" y="438" fill="#101828" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Refactor this code to make it responsive.</text>
  <text x="152" y="476" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="15">Requirements:</text>
  <text x="172" y="506" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="14">- Make the affected UI responsive across common screen sizes.</text>
  <text x="172" y="532" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="14">- Preserve the existing visual design.</text>
  <text x="172" y="558" fill="#475467" font-family="Inter, Arial, sans-serif" font-size="14">- Make the smallest safe changes.</text>
  <rect x="604" y="604" width="156" height="42" rx="21" fill="#155EEF"/>
  <text x="646" y="631" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Send</text>

  <rect x="884" y="168" width="276" height="288" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="908" y="208" fill="#101828" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">PromptBridge Arabic</text>
  <text x="908" y="234" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="13">Saved local settings</text>
  <rect x="908" y="266" width="228" height="38" rx="8" fill="#F9FAFB" stroke="#D0D5DD"/>
  <text x="924" y="290" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="14">Mode: Auto detect</text>
  <rect x="908" y="324" width="16" height="16" rx="4" fill="#155EEF"/>
  <text x="936" y="338" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="14">Focused prompt fallback</text>
  <rect x="908" y="358" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#98A2B3"/>
  <text x="936" y="372" fill="#344054" font-family="Inter, Arial, sans-serif" font-size="14">Redact common secrets</text>
  <rect x="908" y="398" width="228" height="40" rx="20" fill="#155EEF"/>
  <text x="946" y="424" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Convert Selection</text>

