name: Extension Release Assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-browser-extension:
    name: Package extension assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck browser extension
        run: npm run typecheck:browser

      - name: Typecheck VS Code extension
        run: npm run typecheck:vscode

      - name: Build CLI
        run: npm run build

      - name: Smoke test CLI
        run: npm run smoke:cli

      - name: Build browser extension
        run: npm run build:browser

      - name: Package browser extension
        run: npm run package:browser

      - name: Build VS Code extension
        run: npm run build:vscode

      - name: Package VS Code extension
        run: npm run package:vscode

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            notes_file="CHANGELOG.md"
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* --title "$GITHUB_REF_NAME" --notes-file "$notes_file"
          fi
