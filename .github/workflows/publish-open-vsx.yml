name: Publish Open VSX

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-open-vsx:
    name: Publish VSIX to Open VSX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck VS Code extension
        run: npm run typecheck:vscode

      - name: Build and package VS Code extension
        run: npm run release:vscode

      - name: Ensure Open VSX namespace exists
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npm run openvsx:ensure-namespace

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npm run openvsx:publish
